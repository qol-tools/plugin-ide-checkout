[plugin]
name = "Task Runner"
description = "Generic HTTP API for browser extensions to execute local tasks (git checkout, open apps, run scripts)"
version = "1.2.0"
author = "kaho"
platforms = ["macos", "linux"]

[runtime]
command = "task-runner"
actions = { status = ["status"] }

[menu]
label = "Task Runner"
items = [
    { type = "action", id = "status", label = "Status", action = "run" }
]

[daemon]
enabled = true
command = "task-runner"

[[dependencies.binaries]]
name = "task-runner"
repo = "qol-tools/plugin-ide-checkout"
pattern = "task-runner-{os}-{arch}"
